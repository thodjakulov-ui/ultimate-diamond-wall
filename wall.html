:root{--red:#BA1A01;--sand:#FAF2EA;--gold:#EEE3CD;--grey:#222222;--muted:#8c8068;--white:#fff}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--sand);color:var(--grey);font-family:'Everett',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.brand{position:fixed;top:3vh;left:0;right:0;z-index:6;display:flex;justify-content:center;pointer-events:none}
.brand img{width:220px;height:auto}
.stage{position:fixed;inset:0}
.slide{position:absolute;inset:0;padding:12vh 4vw 5vh;display:flex;flex-direction:column;align-items:center;opacity:0;transition:opacity 1.4s ease}
.slide.on{opacity:1}
.couple{font-family:'Wayfinder',serif;font-weight:600;color:var(--grey);font-size:clamp(30px,3.6vw,58px);line-height:1.1;text-align:center;margin-bottom:3vh;flex:0 0 auto}
.couple .amp{color:var(--red);margin:0 .15em}
.grid{display:grid;gap:2.2vh;flex:1 1 auto;width:100%;min-height:0}
.grid.n1{grid-template-columns:1fr}
.grid.n2{grid-template-columns:1fr 1fr}
.grid.n3{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.grid.n3 .tile:first-child{grid-row:span 2}
.grid.n4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.tile{overflow:hidden;background:var(--white);border:1px solid rgba(34,34,34,.07);box-shadow:0 16px 44px rgba(34,34,34,.14)}
.tile img{width:100%;height:100%;object-fit:cover;display:block}
.empty{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px}
.empty h2{font-family:'Wayfinder',serif;font-weight:600;font-size:34px}
.empty p{color:var(--muted);font-size:15px}
@media (prefers-reduced-motion:reduce){.slide{transition:opacity .01s}}

 <div class="stage" id="stage"></div>
 <div class="empty" id="empty"><h2>Your photos will appear here</h2><p>Scan the code in store to share yours.</p></div>
<script>
const TILE="c_fill,g_auto,w_1000,h_1000,q_auto,f_auto";
const HOLD_MS=9000,REFRESH_MS=30000;
const stage=document.getElementById("stage"),empty=document.getElementById("empty");
let cloud=null,groups=[],idx=0,slides=[],sig="";
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const urlFor=p=>`https://res.cloudinary.com/${cloud}/image/upload/${TILE}/v${p.version}/${encodeURIComponent(p.public_id)}.jpg`;
function groupize(photos){const m=new Map();photos.forEach(p=>{const k=p.group||("solo_"+p.public_id);if(!m.has(k))m.set(k,{name:p.name||"",photos:[]});m.get(k).photos.push(p);});return [...m.values()].map(g=>({name:g.name,photos:g.photos.slice(0,4)}));}
function nameHTML(name){if(!name)return "";const parts=name.split(" & ");if(parts.length===2)return `${esc(parts[0])}<span class="amp">&amp;</span>${esc(parts[1])}`;return esc(name);}
function buildSlides(){stage.innerHTML="";slides=groups.map(g=>{const s=document.createElement("div");s.className="slide";const n=g.photos.length;const tiles=g.photos.map(p=>`<div class="tile"><img loading="eager" src="${urlFor(p)}" alt=""></div>`).join("");const name=g.name?`<div class="couple">${nameHTML(g.name)}</div>`:"";s.innerHTML=`${name}<div class="grid n${n}">${tiles}</div>`;stage.appendChild(s);return s;});idx=0;if(slides.length)slides[0].classList.add("on");}
function next(){if(slides.length<2)return;slides[idx].classList.remove("on");idx=(idx+1)%slides.length;slides[idx].classList.add("on");}
async function load(){try{const r=await fetch("/api/photos",{cache:"no-store"});const data=await r.json();cloud=data.cloud;const g=groupize(data.photos||[]);const newSig=JSON.stringify(g.map(x=>x.name+":"+x.photos.map(p=>p.public_id+p.version).join(",")));if(!g.length){empty.style.display="flex";stage.innerHTML="";slides=[];sig="";return;}empty.style.display="none";if(newSig!==sig){sig=newSig;groups=g;buildSlides();}}catch(e){}}
load();setInterval(next,HOLD_MS);setInterval(load,REFRESH_MS);
</script></body></html>
