<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Diamond — Wall</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --page:#ffffff;       /* white gaps / margins */
    --cream:#efe3cc;      /* panel background */
    --black:#1a1a1a;      /* customer name */
    --red:#c41f2d;        /* customer message */
    --muted:#9a8f78;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{ background:var(--page); font-family:"Poppins",system-ui,sans-serif; }

  .stage{ position:fixed; inset:0; padding:14px; }

  /* each entry is a two-panel split that crossfades over the previous */
  .slide{ position:absolute; inset:14px; display:flex; gap:22px; opacity:0; transition:opacity 1.4s ease; }
  .slide.on{ opacity:1; }

  /* LEFT — the photo */
  .photo-pane{ flex:0 0 60%; background:var(--cream); border-radius:5px;
    display:flex; align-items:center; justify-content:center; padding:3.5vh; }
  .photo-pane img{ max-height:100%; max-width:100%; object-fit:contain;
    box-shadow:0 14px 40px rgba(0,0,0,.16); }

  /* RIGHT — name + message */
  .text-pane{ flex:1 1 auto; background:var(--cream); border-radius:5px;
    display:flex; flex-direction:column; align-items:center;
    padding:6vh 4vh; text-align:center; }
  .cust-name{ font-weight:700; color:var(--black); letter-spacing:.01em;
    font-size:clamp(28px,3.2vw,52px); line-height:1.15; }
  .msg-wrap{ flex:1 1 auto; display:flex; align-items:center; justify-content:center; width:100%; }
  .cust-msg{ color:var(--red); font-weight:500; font-size:clamp(22px,2.5vw,40px);
    line-height:1.5; max-width:94%; }

  .empty{ position:fixed; inset:14px; background:var(--cream); border-radius:5px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:14px; }
  .empty h2{ font-weight:600; color:var(--black); font-size:34px; }
  .empty p{ color:var(--muted); font-size:16px; }

  @media (prefers-reduced-motion: reduce){ .slide{ transition:opacity .01s; } }
</style>
</head>
<body>
  <div class="stage" id="stage"></div>
  <div class="empty" id="empty">
    <h2>Your photos will appear here</h2>
    <p>Scan the code in store to share yours.</p>
  </div>

<script>
  // ── How each photo is edited on the wall (enhancement happens at upload). ──
  let TRANSFORM = "c_fit,h_1100,q_auto,f_auto";
  // Add your logo: upload it to Cloudinary, note its public_id, then uncomment:
  // TRANSFORM += "/l_LOGO_PUBLIC_ID,g_south_east,w_150,o_82,x_40,y_40";
  // ──────────────────────────────────────────────────────────────────────────

  const HOLD_MS = 8000;      // time each entry stays on screen
  const REFRESH_MS = 30000;  // how often to check for newly approved photos

  const stage = document.getElementById("stage");
  const empty = document.getElementById("empty");
  let cloud = null, photos = [], idx = 0, slides = [];

  const esc = s => (s || "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
  const urlFor = p => `https://res.cloudinary.com/${cloud}/image/upload/${TRANSFORM}/v${p.version}/${encodeURIComponent(p.public_id)}.jpg`;

  function buildSlides(){
    stage.innerHTML = "";
    slides = photos.map(p => {
      const slide = document.createElement("div");
      slide.className = "slide";
      const name = p.name ? `<div class="cust-name">${esc(p.name)}</div>` : "";
      const msg  = p.blurb ? esc(p.blurb) : "Thank you for visiting Ultimate Diamond.";
      slide.innerHTML =
        `<div class="photo-pane"><img loading="eager" src="${urlFor(p)}" alt=""></div>` +
        `<div class="text-pane">${name}<div class="msg-wrap"><p class="cust-msg">${msg}</p></div></div>`;
      stage.appendChild(slide);
      return slide;
    });
    idx = 0;
    if (slides.length) slides[0].classList.add("on");
  }

  function next(){
    if (slides.length < 2) return;
    slides[idx].classList.remove("on");
    idx = (idx + 1) % slides.length;
    slides[idx].classList.add("on");
  }

  async function load(){
    try {
      const r = await fetch("/api/photos", { cache:"no-store" });
      const data = await r.json();
      cloud = data.cloud;
      const incoming = data.photos || [];
      const changed = JSON.stringify(incoming.map(p => p.public_id + p.version))
                   !== JSON.stringify(photos.map(p => p.public_id + p.version));
      photos = incoming;
      if (!photos.length){ empty.style.display = "flex"; stage.innerHTML = ""; slides = []; return; }
      empty.style.display = "none";
      if (changed || !slides.length) buildSlides();
    } catch(e){ /* keep showing what's already up */ }
  }

  load();
  setInterval(next, HOLD_MS);
  setInterval(load, REFRESH_MS);
</script>
</body>
</html>
